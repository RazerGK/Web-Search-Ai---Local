<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Search Chatbot</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .chat-container {
            background: #2d2d2d;
            border-radius: 10px;
            width: 100%;
            max-width: 600px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .chat-header {
            background: #404040;
            color: #00ff88;
            padding: 15px;
            border-radius: 10px 10px 0 0;
            font-size: 18px;
            font-weight: bold;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeIn 0.3s;
        }
        
        .user-message {
            background: #0084ff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        
        .bot-message {
            background: #404040;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        
        .chat-input {
            display: flex;
            padding: 15px;
            background: #363636;
            border-radius: 0 0 10px 10px;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #4a4a4a;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        .chat-input button {
            padding: 10px 20px;
            background: #0084ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .chat-input button:hover {
            background: #0066cc;
        }
        
        .typing-indicator {
            display: none;
            padding: 10px 15px;
            background: #404040;
            border-radius: 18px;
            align-self: flex-start;
            color: #888;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #2d2d2d;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            Web Search Bot
        </div>
        <div class="chat-messages" id="messages">
            <div class="message bot-message">
                Hallo! Ich suche im Web nach Antworten. Was möchtest du wissen?
            </div>
        </div>
        <div class="typing-indicator" id="typing">
            Suche im Web...
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Frag mich etwas..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Senden</button>
        </div>
    </div>

    <script>
        function addMessage(text, isUser) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + (isUser ? 'user-message' : 'bot-message');
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const query = input.value.trim();
            
            if (!query) return;
            
            addMessage(query, true);
            input.value = '';
            
            document.getElementById('typing').style.display = 'block';
            
            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query: query })
                });
                
                const data = await response.json();
                document.getElementById('typing').style.display = 'none';
                addMessage(data.answer, false);
                
            } catch (error) {
                document.getElementById('typing').style.display = 'none';
                addMessage('Verbindungsfehler. Bitte versuche es erneut.', false);
            }
        }
    </script>
</body>
</html>
